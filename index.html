<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    background: #000;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .screen.active { display: flex; }

  /* SPLASH */
  #splash, #tap-start {
    background: linear-gradient(135deg, #FD297B 0%, #FF5864 50%, #FF6036 100%);
  }
  .flame {
    width: 120px;
    height: 140px;
    margin-bottom: 20px;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.25));
    animation: flicker 2s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { transform: scale(1) rotate(-1deg); }
    50% { transform: scale(1.04) rotate(1deg); }
  }
  .splash-title {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 60px;
  }
  .dots { display: flex; gap: 8px; }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.8);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.16s; }
  .dot:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }

  .tap-btn {
    background: #fff;
    color: #FF5864;
    border: none;
    padding: 16px 40px;
    font-size: 18px;
    font-weight: 600;
    border-radius: 30px;
    margin-top: 40px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }

  /* REVEAL */
  #reveal { background: #000; }
  #captured-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .reveal-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
  }
  .reveal-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 20px;
  }
  .reveal-big {
    font-size: 58px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #FD297B, #FF6036);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 20px rgba(255,88,100,0.5);
    animation: slam 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
  }
  @keyframes slam {
    0% { transform: scale(3); opacity: 0; }
    60% { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .reveal-sub {
    font-size: 22px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 12px;
    animation: fadeUp 0.8s 0.4s backwards;
  }
  .reveal-caught {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.6s backwards;
  }
  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .got-btn {
    background: linear-gradient(135deg, #FD297B, #FF6036);
    color: #fff;
    border: none;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(253,41,123,0.4);
    animation: fadeUp 0.8s 0.8s backwards;
  }
  .got-btn:active { transform: scale(0.96); }

  .secret-zone {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 80px;
    height: 80px;
    z-index: 10;
  }

  .err-msg {
    padding: 30px;
    text-align: center;
    font-size: 16px;
    max-width: 340px;
  }

  /* GALLERY */
  #gallery {
    background: #0a0a0a;
    justify-content: flex-start;
    align-items: stretch;
    overflow-y: auto;
  }
  .gallery-header {
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
  }
  .gallery-title {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, #FD297B, #FF6036);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .icon-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    width: 36px;
    height: 36px;
    border-radius: 18px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active { background: rgba(255,255,255,0.15); }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    padding: 3px;
  }
  .thumb {
    aspect-ratio: 1;
    background: #1a1a1a;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }
  .thumb-time {
    position: absolute;
    bottom: 4px;
    left: 4px;
    right: 4px;
    font-size: 10px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 2px 6px;
    border-radius: 4px;
    text-align: center;
  }
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: rgba(255,255,255,0.5);
  }
  .empty-flame { font-size: 48px; margin-bottom: 16px; }
  .clear-btn {
    margin: 20px;
    padding: 14px;
    background: rgba(255,68,68,0.15);
    color: #ff4444;
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  #viewer { background: #000; z-index: 100; }
  #viewer img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    transform: scaleX(-1);
  }
  .viewer-actions {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 0 20px;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .viewer-btn {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .viewer-btn.danger {
    background: rgba(255,68,68,0.15);
    color: #ff4444;
    border-color: rgba(255,68,68,0.3);
  }
  .viewer-close {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    right: 20px;
    z-index: 2;
  }
  .viewer-meta {
    position: absolute;
    top: max(20px, env(safe-area-inset-top));
    left: 20px;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
  }

  #cam { display: none; }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 1000;
    display: none;
  }
</style>
</head>

  <svg class="flame" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">

</div>

<div id="viewer" class="screen">
  <button class="icon-btn viewer-close" id="viewer-close">&#x2715;</button>

  <img id="viewer-img" alt="">
  <div class="viewer-actions">
    <button class="viewer-btn" id="viewer-download">Save</button>
    <button class="viewer-btn danger" id="viewer-delete">Delete</button>
  </div>
</div>

<video id="cam" autoplay playsinline muted></video>
<div id="toast"></div>

<script>
(function() {
  'use strict';

  function toast(msg, ms) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, ms || 2500);
  }

  // ---------- IndexedDB storage ----------
  const DB_NAME = 'flame_db';
  const DB_VER = 1;
  const STORE = 'captures';
  let _db = null;

  function openDB() {
    if (_db) return Promise.resolve(_db);
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) { reject(new Error('no-idb')); return; }
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE)) {
          const os = db.createObjectStore(STORE, { keyPath: 'id' });
          os.createIndex('timestamp', 'timestamp', { unique: false });
        }
      };
      req.onsuccess = () => { _db = req.result; resolve(_db); };
      req.onerror = () => reject(req.error);
    });
  }

  async function addCapture(capture) {
    try {
      const db = await openDB();
      return await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).add(capture);
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(tx.error);
      });
    } catch (e) {
      console.error('addCapture failed', e);
      // Fallback: localStorage
      try {
        const raw = localStorage.getItem('flame_fallback') || '[]';
        const arr = JSON.parse(raw);
        arr.unshift(capture);
        if (arr.length > 20) arr.length = 20; // limit fallback size
        localStorage.setItem('flame_fallback', JSON.stringify(arr));
        return true;
      } catch (e2) {
        console.error('localStorage fallback failed', e2);
        return false;
      }
    }
  }

  async function getAllCaptures() {
    try {
      const db = await openDB();
      return await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).getAll();
        req.onsuccess = () => {
          const arr = req.result || [];
          arr.sort((a, b) => b.timestamp - a.timestamp);
          resolve(arr);
        };
        req.onerror = () => reject(req.error);
      });
    } catch (e) {
      try {
        return JSON.parse(localStorage.getItem('flame_fallback') || '[]');
      } catch { return []; }
    }
  }

  async function deleteCapture(id) {
    try {
      const db = await openDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) {
      try {
        const arr = JSON.parse(localStorage.getItem('flame_fallback') || '[]');
        localStorage.setItem('flame_fallback', JSON.stringify(arr.filter(c => c.id !== id)));
      } catch {}
    }
  }

  async function clearCaptures() {
    try {
      const db = await openDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).clear();
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
      });
    } catch (e) {}
    try { localStorage.removeItem('flame_fallback'); } catch {}
  }

  // ---------- Screens ----------
  const screens = {
    splash: document.getElementById('splash'),
    tap: document.getElementById('tap-start'),
    reveal: document.getElementById('reveal'),
    error: document.getElementById('error'),
    gallery: document.getElementById('gallery'),
    viewer: document.getElementById('viewer')
  };
  function show(name) {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    screens[name].classList.add('active');
  }

  // ---------- Camera ----------
  const video = document.getElementById('cam');
  let stream = null;

  async function startCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById('err-text').textContent = 'Camera not supported on this browser.';
      show('error');
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 960 }, height: { ideal: 960 } },
        audio: false
      });
      video.srcObject = stream;
      await new Promise(res => {
        if (video.readyState >= 2) return res();
        video.onloadedmetadata = () => res();
      });
      await video.play().catch(() => {});
      await new Promise(r => setTimeout(r, 700));
      await capturePhoto();
    } catch (err) {
      console.error('camera error', err);
      document.getElementById('err-text').textContent =
        'Camera permission was denied. Open iPhone Settings > Safari > Camera and set this site to Allow.';
      show('error');
    }
  }

  async function capturePhoto() {
    const w = video.videoWidth || 720;
    const h = video.videoHeight || 720;
    const maxDim = 720;
    const scale = Math.min(1, maxDim / Math.max(w, h));
    const outW = Math.round(w * scale);
    const outH = Math.round(h * scale);
    const canvas = document.createElement('canvas');
    canvas.width = outW;
    canvas.height = outH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, outW, outH);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.75);

    document.getElementById('captured-bg').src = dataUrl;
    show('reveal');

    const saved = await addCapture({
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      timestamp: Date.now(),
      dataUrl: dataUrl
    });
    if (!saved) {
      console.warn('photo not saved');
    }

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  // ---------- Boot ----------
  async function boot() {
    await new Promise(r => setTimeout(r, 1500));
    try {
      await startCamera();
    } catch (e) {
      show('tap');
    }
  }

  document.getElementById('tap-btn').addEventListener('click', () => {
    show('splash');
    setTimeout(startCamera, 400);
  });
  document.getElementById('retry-btn').addEventListener('click', () => {
    show('splash');
    setTimeout(startCamera, 400);
  });

  document.getElementById('got-btn').addEventListener('click', () => {
    const btn = document.getElementById('got-btn');
    btn.textContent = 'Gotcha';
    btn.disabled = true;
  });

  // ---------- Secret gallery: long-press bottom-right corner 3s ----------
  function attachSecret(el) {
    let timer = null;
    const start = () => { timer = setTimeout(openGallery, 3000); };
    const cancel = () => { if (timer) { clearTimeout(timer); timer = null; } };
    el.addEventListener('touchstart', start, { passive: true });
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchcancel', cancel);
    el.addEventListener('touchmove', cancel);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);
  }
  attachSecret(document.getElementById('secret-zone'));
  attachSecret(document.getElementById('secret-zone-err'));

  // Triple-tap flame on splash for owner to check gallery before camera fires
  let splashTaps = 0;
  let splashTapTimer = null;
  document.querySelector('#splash .flame').addEventListener('click', () => {
    splashTaps++;
    clearTimeout(splashTapTimer);
    splashTapTimer = setTimeout(() => { splashTaps = 0; }, 800);
    if (splashTaps >= 3) {
      splashTaps = 0;
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      openGallery();
    }
  });

  // ---------- Gallery ----------
  async function openGallery() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    const captures = await getAllCaptures();
    renderGallery(captures);
    show('gallery');
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleString(undefined, {
      month: 'numeric', day: 'numeric',
      hour: 'numeric', minute: '2-digit'
    });
  }

  function renderGallery(captures) {
    const root = document.getElementById('gallery-content');
    if (!captures.length) {
      root.innerHTML = '<div class="empty"><div class="empty-flame">&#x1F525;</div><div>No victims yet.</div><div style="font-size: 13px; margin-top: 8px; opacity: 0.6;">Photos will show up here.</div></div>';
      return;
    }
    const grid = captures.map(c => (
      '<div class="thumb" data-id="' + c.id + '">' +
        '<img src="' + c.dataUrl + '" alt="">' +
        '<div class="thumb-time">' + formatTime(c.timestamp) + '</div>' +
      '</div>'
    )).join('');
    root.innerHTML = '<div class="grid">' + grid + '</div><button class="clear-btn" id="clear-all">Delete all photos</button>';
    root.querySelectorAll('.thumb').forEach(t => {
      t.addEventListener('click', () => openViewer(t.dataset.id));
    });
    document.getElementById('clear-all').addEventListener('click', async () => {
      if (confirm('Delete every captured photo? This cannot be undone.')) {
        await clearCaptures();
        renderGallery([]);
      }
    });
  }

  document.getElementById('gallery-back').addEventListener('click', () => {
    show('splash');
    boot();
  });

  // ---------- Viewer ----------
  let currentViewId = null;
  async function openViewer(id) {
    const captures = await getAllCaptures();
    const c = captures.find(x => x.id === id);
    if (!c) return;
    currentViewId = id;
    document.getElementById('viewer-img').src = c.dataUrl;
    document.getElementById('viewer-meta').textContent = formatTime(c.timestamp);
    show('viewer');
  }
  document.getElementById('viewer-close').addEventListener('click', () => {
    currentViewId = null;
    openGallery();
  });
  document.getElementById('viewer-download').addEventListener('click', async () => {
    const captures = await getAllCaptures();
    const c = captures.find(x => x.id === currentViewId);
    if (!c) return;
    const a = document.createElement('a');
    a.href = c.dataUrl;
    a.download = 'flame-' + c.timestamp + '.jpg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('Saved');
  });
  document.getElementById('viewer-delete').addEventListener('click', async () => {
    if (!currentViewId) return;
    if (!confirm('Delete this photo?')) return;
    await deleteCapture(currentViewId);
    currentViewId = null;
    openGallery();
  });

  boot();
})();
</script>
</body>
</html>
